# ──────────────────────────────────────────────────────────────────────────────
# SonarCloud project configuration — Abroad Matrimony Backend
# Docs: https://docs.sonarcloud.io/advanced-setup/ci-based-analysis/
#
# Setup steps (one-time, on the local machine):
#   1. Go to https://sonarcloud.io and sign in with GitHub
#   2. Click "+" → "Analyze new project" → import sibinfrancisaj/migration_cr
#   3. Choose "With GitHub Actions" to get your SONAR_TOKEN
#   4. Add SONAR_TOKEN to GitHub repo → Settings → Secrets → Actions
#   5. Push this file — the CI scan step will activate automatically
# ──────────────────────────────────────────────────────────────────────────────

sonar.projectKey=sibinfrancisaj_migration_cr
sonar.organization=sibinfrancisaj

sonar.projectName=Abroad Matrimony Backend
sonar.projectVersion=0.0.0

# ── Source roots ───────────────────────────────────────────────────────────────
# List every lib/app source directory so Sonar sees the full codebase.
sonar.sources=\
  apps/gateway/src,\
  libs/auth/src,\
  libs/shared/src,\
  libs/config/src,\
  libs/logger/src,\
  libs/cache/src,\
  libs/db/src,\
  libs/event-bus/src

# Exclude generated code, build output, and test helpers from source analysis.
sonar.exclusions=\
  **/node_modules/**,\
  **/dist/**,\
  **/coverage/**,\
  **/__tests__/**,\
  **/*.test.ts,\
  **/*.spec.ts

# ── Test roots ─────────────────────────────────────────────────────────────────
sonar.tests=\
  apps/gateway/src,\
  libs/auth/src

sonar.test.inclusions=**/__tests__/**/*.test.ts

# ── Coverage ───────────────────────────────────────────────────────────────────
# Paths are relative to the repo root.
# jest.config coverageDirectory outputs lcov.info here (relative to each package,
# ../../coverage/<pkg>) which resolves to coverage/<pkg>/ at the repo root.
sonar.javascript.lcov.reportPaths=\
  coverage/libs/auth/lcov.info,\
  coverage/apps/gateway/lcov.info

# Files excluded from coverage reporting (mirrors coveragePathIgnorePatterns).
sonar.coverage.exclusions=\
  **/server.ts,\
  **/health.route.ts,\
  **/types/**,\
  **/index.ts,\
  **/__tests__/**

# ── Language / encoding ────────────────────────────────────────────────────────
sonar.sourceEncoding=UTF-8

# ── Quality Gate ───────────────────────────────────────────────────────────────
# Fail the CI step if the quality gate is not met.
sonar.qualitygate.wait=true

# ── SCM ────────────────────────────────────────────────────────────────────────
sonar.scm.provider=git
