name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: Lint (affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - run: yarn nx affected -t lint --parallel=3

  typecheck:
    name: Typecheck (affected)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - run: yarn nx affected -t typecheck --parallel=3

  test:
    name: Test (affected)
    runs-on: ubuntu-latest
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - run: yarn nx affected -t test --parallel=3 --coverage
        env:
          NODE_ENV: test
          REDIS_URL: redis://localhost:6379
          REDIS_KEY_PREFIX: am:test:
          JWT_ACCESS_SECRET: test_access_secret_min_64_chars_long_abcdef1234567890abcdef
          JWT_REFRESH_SECRET: test_refresh_secret_min_64_chars_long_abcdef1234567890xyz
          ADMIN_JWT_SECRET: test_admin_secret_min_64_chars_long_abcdef1234567890abc000
          JWT_ACCESS_EXPIRES_IN: 15m
          JWT_REFRESH_EXPIRES_IN: 30d
          ADMIN_JWT_EXPIRES_IN: 8h
          FEATURE_FLAGS_CACHE_TTL_SECONDS: 0

  build:
    name: Build (affected)
    runs-on: ubuntu-latest
    needs: [lint, typecheck]
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: yarn
      - run: yarn install --frozen-lockfile
      - uses: nrwl/nx-set-shas@v4
      - run: yarn nx affected -t build --parallel=3
