  - name: Payment — Razorpay
    description: Razorpay orders, payment capture, and webhook ingestion
  - name: Payment — Membership
    description: Founding Member membership status
  - name: Payment — Credits
    description: Credit (diamond) currency balance, spend, purchase, and history
  - name: Admin — Auth
    description: Admin user login (email + password + optional TOTP)
  - name: Admin — Users
    description: User search, role management, and suspension
  - name: Admin — Moderation
    description: Flag review queue and resolution
  - name: Admin — Payment
    description: Refund processing and ledger reversal
  - name: Admin — Analytics
    description: Platform-level engagement and signup metrics
  - name: Admin — Verification
    description: ID document and selfie review queue
  - name: Admin — Groups
