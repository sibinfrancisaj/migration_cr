                    - { layer: "FACE", isComplete: true, points: 25, label: "Face Verified", description: "Selfie matched to ID.", completedAt: "2026-05-15T00:00:00.000Z" }
                    - { layer: "VOICE_INTRO", isComplete: true, points: 15, label: "Voice Intro", description: "60s voice intro uploaded.", completedAt: "2026-05-10T00:00:00.000Z" }
                    - { layer: "WORK", isComplete: true, points: 20, label: "Work Verified", description: "Employment doc reviewed.", completedAt: "2026-05-20T00:00:00.000Z" }
                    - { layer: "EDUCATION", isComplete: false, points: 20, label: "Education", description: "Not yet uploaded.", completedAt: null }
