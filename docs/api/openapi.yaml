openapi: 3.1.0

info:
  title: Abroad Matrimony API
  version: 1.0.0
  description: |
    REST API for the Abroad Matrimony matchmaking platform.

    **Authentication:** All user endpoints (except OTP request/verify and token refresh)
    require a Bearer access token issued by `POST /api/v1/auth/otp/verify` or
    `POST /api/v1/auth/token/refresh`.

    Admin endpoints require a Bearer admin token from `POST /admin/auth/login`.

    Webhook endpoints (`/stripe/webhook`, `/razorpay/webhook`) use provider signature
    verification instead of Bearer tokens.

    **Response envelope:** Every response follows `ApiResponse<T>`:
    ```json
    {
      "success": true,
      "data": { ... },
      "meta": { "hasMore": false, "cursor": null },
      "requestId": "req_abc123"
    }
    ```
    Errors add `"error": { "code": "ERROR_CODE", "message": "Human-readable message" }`.

    **All money values** are integers in paise (INR) or cents (USD). Never floats.

  contact:
    name: Abroad Matrimony Engineering
  license:
    name: Private

servers:
  - url: http://localhost:3000
    description: Local development
  - url: https://api.abroadmatrimony.com
    description: Production

# ── Security Schemes ──────────────────────────────────────────────────────────

components:
  securitySchemes:
    userBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT access token issued by /api/v1/auth/otp/verify or /token/refresh. Expires in 15 minutes.
    adminBearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: Admin JWT issued by /admin/auth/login. Longer-lived; carries AdminRole claim.

# ── Reusable Schemas ──────────────────────────────────────────────────────────

  schemas:

    # ── Common wrappers ───────────────────────────────────────────────────────

    ApiError:
      type: object
      required: [code, message]
      properties:
        code:    { type: string, example: VALIDATION_ERROR }
        message: { type: string, example: "Phone must be in E.164 format" }
        details: { type: object, additionalProperties: true }

    PaginationMeta:
      type: object
      required: [hasMore]
      properties:
        cursor:  { type: string, nullable: true, example: "eyJsYXN0SWQiOiJ1dWlkIn0" }
        hasMore: { type: boolean }
        total:   { type: integer, nullable: true }

    # ── Enums ─────────────────────────────────────────────────────────────────

    Gender:
      type: string
      enum: [MALE, FEMALE, NON_BINARY, PREFER_NOT_TO_SAY]

    UserRole:
      type: string
      enum: [USER, VERIFIED, FOUNDING_MEMBER, SUSPENDED]

    AdminRole:
      type: string
      enum: [SUPERADMIN, OPS, MODERATOR, ANALYST]

    VerificationStatus:
      type: string
      enum: [PENDING, UNDER_REVIEW, APPROVED, REJECTED, EXPIRED]

    MembershipPlan:
      type: string
      enum: [FOUNDING_MEMBER, STANDARD]

    MembershipStatus:
      type: string
      enum: [ACTIVE, CANCELLED, EXPIRED, PAST_DUE]

    PaymentProvider:
      type: string
      enum: [STRIPE, RAZORPAY]

    PaymentStatus:
      type: string
      enum: [PENDING, SUCCEEDED, FAILED, REFUNDED]

    MessageType:
      type: string
      enum: [TEXT, IMAGE, VOICE, SYSTEM]

    FlagReason:
      type: string
      enum: [INAPPROPRIATE_CONTENT, HARASSMENT, SPAM, FAKE_IDENTITY, UNDERAGE_CONCERN, OTHER]

    FlagAction:
      type: string
      enum: [NO_ACTION, USER_WARNED, MESSAGE_REMOVED, USER_SUSPENDED, USER_BANNED]

    FlagStatus:
      type: string
      enum: [OPEN, UNDER_REVIEW, RESOLVED, DISMISSED]

    DiamondReason:
      type: string
      enum: [PURCHASE, ADMIN_GRANT, REFUND, FEATURE_UNLOCK, EXPIRY]

    RealLifeQuestionKey:
      type: string
      enum:
        - PARENTS_INVOLVEMENT
        - FAMILY_STRUCTURE
        - KIDS
        - FAITH_IN_PRACTICE
        - DIET
        - LANGUAGE_AT_HOME
        - CAREER
        - MONEY
        - BODY_AND_HEALTH
        - MIND_AND_EMOTIONAL
        - MINDSET_AND_AMBITION
        - WHERE_TO_SETTLE

    StoryPromptKey:
      type: string
      enum: [PARENTS_LOVE, DEAL_BREAKER, TYPICAL_SUNDAY]

    ConnectionStatus:
      type: string
      enum: [PENDING, ACCEPTED, PASSED, WITHDRAWN]
      description: Lifecycle state of a connection request.

    GroupAccessType:
      type: string
      enum: [OPEN, CREDIT_GATED, INVITE_ONLY]
      description: How a user gains access to a group.

    IdDocumentType:
      type: string
      enum: [PASSPORT, DRIVING_LICENCE, NATIONAL_ID]
      description: Type of government-issued ID document uploaded for verification.

    HabitKey:
      type: string
      enum: [MORNING_ROUTINE, EXERCISE, HEALTHY_EATING, MINDFULNESS, JOURNALING, SOCIAL_CONNECTION, LEARNING]
      description: Canonical key for a trackable daily habit.

    SavedProfileLabel:
      type: string
      enum: [HIGH_FIT, EXPIRING, MAYBE]
      description: User-applied label on a saved profile card.

    EventTag:
      type: string
      enum: [SOCIAL, CULTURAL, PROFESSIONAL, WELLNESS]
      description: Category tag for a community gathering.

    PromptResponseType:
      type: string
      enum: [TEXT, VOICE]
      description: Medium used to answer the weekly community prompt.

    VerificationLayer:
      type: string
      enum: [PHONE, FACE, VOICE_INTRO, WORK, EDUCATION]
      description: One of the five trust verification layers. Each layer has a point value (Phone=20, Face=25, Voice=15, Work=20, Education=20).

    CreditTransactionReason:
      type: string
      enum: [PURCHASE, INTRO_UNLOCK, GROUP_JOIN, EVENT_RSVP, ADMIN_GRANT, REFUND, EXPIRY]
      description: Reason for a credit ledger entry. Maps to DiamondReason on the backend.

    # ── Domain objects ────────────────────────────────────────────────────────

    TokenPair:
      type: object
      required: [accessToken, refreshToken, expiresIn]
      properties:
        accessToken:  { type: string, description: "JWT access token. Valid 15 minutes." }
        refreshToken: { type: string, description: "Opaque refresh token. Valid 30 days. One-time use." }
        expiresIn:    { type: integer, example: 900, description: "Seconds until access token expires." }

    MediaDto:
      type: object
      required: [id, type, url, isVerified, createdAt]
      properties:
        id:         { type: string, format: uuid }
        type:       { type: string, enum: [PHOTO, VOICE_INTRO, VIDEO_INTRO, ID_DOCUMENT, SELFIE] }
        url:        { type: string, format: uri }
        order:      { type: integer, nullable: true }
        isVerified: { type: boolean }
        createdAt:  { type: string, format: date-time }

    RealLifeAnswerDto:
      type: object
      required: [questionKey, value, updatedAt]
      properties:
        questionKey: { $ref: '#/components/schemas/RealLifeQuestionKey' }
        value:
          oneOf:
            - type: string
            - type: array
              items: { type: string }
        updatedAt: { type: string, format: date-time }

    StoryPromptAnswerDto:
      type: object
      required: [promptKey, answer, updatedAt]
      properties:
        promptKey: { $ref: '#/components/schemas/StoryPromptKey' }
        answer:    { type: string }
        updatedAt: { type: string, format: date-time }

    ScoreBreakdown:
      type: object
      description: |
        Compatibility score breakdown. Each field is a normalised float 0.0–1.0.
        9 core v1 dimensions are always present. Optional dimensions are added when
        both users have the relevant data (HABIT-008, PROMPT-007). Future v2 dimensions
        are behind the ALG_V2 feature flag.
      required:
        - verification
        - settlementIntent
        - realLifeAnswers
        - profileCompleteness
        - checkInRecency
        - ageCompatibility
        - groupMembership
        - languageMatch
        - faithAlignment
      properties:
        # v1 core dimensions (always present)
        verification:         { type: number, format: float, description: "Trust score layer completion ratio." }
        settlementIntent:     { type: number, format: float, description: "Alignment on where to settle long-term." }
        realLifeAnswers:      { type: number, format: float, description: "Weighted dot-product of Real Life question answers." }
        profileCompleteness:  { type: number, format: float, description: "Proportion of profile fields filled." }
        checkInRecency:       { type: number, format: float, description: "Decay-weighted Sunday check-in activity." }
        ageCompatibility:     { type: number, format: float, description: "Gaussian score centred on preferred age delta." }
        groupMembership:      { type: number, format: float, description: "Overlap of shared regional groups." }
        languageMatch:        { type: number, format: float, description: "Primary language compatibility." }
        faithAlignment:       { type: number, format: float, description: "Faith-in-practice answer similarity." }
        # Optional v1 dimensions — present only when both users have the relevant data
        habitConsistency:     { type: number, format: float, nullable: true, description: "HABIT-008 — Similarity of daily habit consistency rates over last 30 days." }
        habitOverlap:         { type: number, format: float, nullable: true, description: "HABIT-008 — Jaccard overlap of active habit key sets." }
        promptResonance:      { type: number, format: float, nullable: true, description: "PROMPT-007 — Mutual resonate signals on weekly prompt responses. 1.0=mutual, 0.5=one-way, 0.0=none." }
        # v2 dimensions (present when ALG_V2 feature flag is on)
        weeklyRhythm:         { type: number, format: float, nullable: true, description: "v2 — Similarity in weekly habit cadence." }
        consistencyScore:     { type: number, format: float, nullable: true, description: "v2 — Habit streak depth and recency." }
        settlementIntentV2:   { type: number, format: float, nullable: true, description: "v2 — Refined settlement alignment using Match Tuning inputs." }
        familyStyle:          { type: number, format: float, nullable: true, description: "v2 — Parenting and family structure preference match." }
        eventCoAttendance:    { type: number, format: float, nullable: true, description: "v2 — Shared gathering attendance overlap." }
        communicationStyle:   { type: number, format: float, nullable: true, description: "v2 — Response cadence and voice-vs-text preference." }
        profileMomentum:      { type: number, format: float, nullable: true, description: "v2 — Recent profile completion velocity." }
        trustDepth:           { type: number, format: float, nullable: true, description: "v2 — Composite trust layer score (0–100 normalised)." }

    ProfileDto:
      type: object
      required: [id, userId, name, dateOfBirth, gender, currentCity, currentCountry, settlementIntent, completionScore, verificationStatus, isVerified, photos, realLifeAnswers, storyPrompts, createdAt, updatedAt]
      properties:
        id:               { type: string, format: uuid }
        userId:           { type: string, format: uuid }
        name:             { type: string, example: "Arjun Sharma" }
        dateOfBirth:      { type: string, format: date, example: "1995-04-15" }
        gender:           { $ref: '#/components/schemas/Gender' }
        currentCity:      { type: string, example: "Toronto" }
        currentCountry:   { type: string, example: "Canada" }
        settlementIntent: { type: string, example: "Open to moving back to India after 5 years" }
        bio:              { type: string, nullable: true }
        completionScore:  { type: integer, minimum: 0, maximum: 100 }
        verificationStatus: { $ref: '#/components/schemas/VerificationStatus' }
        isVerified:       { type: boolean }
        photos:           { type: array, items: { $ref: '#/components/schemas/MediaDto' } }
        realLifeAnswers:  { type: array, items: { $ref: '#/components/schemas/RealLifeAnswerDto' } }
        storyPrompts:     { type: array, items: { $ref: '#/components/schemas/StoryPromptAnswerDto' } }
        createdAt:        { type: string, format: date-time }
        updatedAt:        { type: string, format: date-time }

    DiscoveryItemDto:
      type: object
      required: [userId, name, age, currentCity, currentCountry, settlementIntent, completionScore, verificationStatus, totalScore, scoreBreakdown]
      properties:
        userId:           { type: string, format: uuid }
        name:             { type: string }
        age:              { type: integer }
        currentCity:      { type: string }
        currentCountry:   { type: string }
        settlementIntent: { type: string }
        completionScore:  { type: integer }
        verificationStatus: { $ref: '#/components/schemas/VerificationStatus' }
        photoUrl:         { type: string, format: uri, nullable: true }
        totalScore:       { type: number, format: float }
        scoreBreakdown:   { $ref: '#/components/schemas/ScoreBreakdown' }

    ConversationSummaryDto:
      type: object
      required: [id, matchId, otherUser, isArchived, createdAt]
      properties:
        id:              { type: string, format: uuid }
        matchId:         { type: string, format: uuid }
        otherUser:
          type: object
          required: [userId, name]
          properties:
            userId: { type: string, format: uuid }
            name:   { type: string }
            photoUrl: { type: string, format: uri, nullable: true }
        lastMessage:
          type: object
          nullable: true
          properties:
            type:      { $ref: '#/components/schemas/MessageType' }
            content:   { type: string }
            createdAt: { type: string, format: date-time }
        isArchived:   { type: boolean }
        lastMessageAt: { type: string, format: date-time, nullable: true }
        createdAt:    { type: string, format: date-time }

    MessageDto:
      type: object
      required: [id, conversationId, senderId, type, content, createdAt]
      properties:
        id:             { type: string, format: uuid }
        conversationId: { type: string, format: uuid }
        senderId:       { type: string, format: uuid }
        type:           { $ref: '#/components/schemas/MessageType' }
        content:        { type: string, description: "Text body or media URL." }
        mediaUrl:       { type: string, format: uri, nullable: true }
        durationSeconds: { type: integer, nullable: true, description: "Voice message duration." }
        flagCount:      { type: integer, minimum: 0 }
        isHidden:       { type: boolean }
        readAt:         { type: string, format: date-time, nullable: true }
        createdAt:      { type: string, format: date-time }

    MembershipDto:
      type: object
      required: [id, userId, plan, provider, status, createdAt]
      properties:
        id:           { type: string, format: uuid }
        userId:       { type: string, format: uuid }
        plan:         { $ref: '#/components/schemas/MembershipPlan' }
        provider:     { $ref: '#/components/schemas/PaymentProvider' }
        status:       { $ref: '#/components/schemas/MembershipStatus' }
        providerSubId: { type: string, nullable: true, example: "sub_1NxXxXxXxXxXxX" }
        expiresAt:    { type: string, format: date-time, nullable: true }
        createdAt:    { type: string, format: date-time }

    FlagDto:
      type: object
      required: [id, reporterId, targetUserId, targetEntityType, reason, status, createdAt]
      properties:
        id:               { type: string, format: uuid }
        reporterId:       { type: string, format: uuid }
        targetUserId:     { type: string, format: uuid }
        targetEntityType: { type: string, example: "Message" }
        targetEntityId:   { type: string, format: uuid, nullable: true }
        reason:           { $ref: '#/components/schemas/FlagReason' }
        description:      { type: string, nullable: true }
        status:           { $ref: '#/components/schemas/FlagStatus' }
        actionTaken:      { $ref: '#/components/schemas/FlagAction', nullable: true }
        moderatorId:      { type: string, format: uuid, nullable: true }
        resolvedAt:       { type: string, format: date-time, nullable: true }
        createdAt:        { type: string, format: date-time }

    # ── Connection DTOs ───────────────────────────────────────────────────────

    ConnectionDto:
      type: object
      required: [id, requesterId, recipientId, status, createdAt]
      properties:
        id:           { type: string, format: uuid }
        requesterId:  { type: string, format: uuid }
        recipientId:  { type: string, format: uuid }
        status:       { $ref: '#/components/schemas/ConnectionStatus' }
        message:      { type: string, nullable: true, description: "Optional intro message sent with the request." }
        resolvedAt:   { type: string, format: date-time, nullable: true }
        createdAt:    { type: string, format: date-time }
        otherUser:
          type: object
          nullable: true
          description: "Summary of the other party. Populated in list/detail views."
          properties:
            userId:   { type: string, format: uuid }
            name:     { type: string }
            photoUrl: { type: string, format: uri, nullable: true }
            age:      { type: integer, nullable: true }
            city:     { type: string, nullable: true }

    # ── Group DTOs ────────────────────────────────────────────────────────────

    GroupDto:
      type: object
      required: [id, name, region, country, memberCount, maxMembers, accessType, creditCost, isJoined, expiresAt, createdAt]
      properties:
        id:          { type: string, format: uuid }
        name:        { type: string, example: "UK Indians — London" }
        region:      { type: string, example: "London" }
        country:     { type: string, example: "UK" }
        description: { type: string, nullable: true }
        memberCount: { type: integer }
        maxMembers:  { type: integer }
        accessType:  { $ref: '#/components/schemas/GroupAccessType' }
        creditCost:  { type: integer, description: "Credits required to join. 0 for OPEN groups." }
        isJoined:    { type: boolean }
        expiresAt:   { type: string, format: date-time, nullable: true, description: "When the user's membership in this group expires." }
        createdAt:   { type: string, format: date-time }

    # ── Verification DTOs ─────────────────────────────────────────────────────

    VerificationLayerDto:
      type: object
      required: [layer, isComplete, points]
      properties:
        layer:      { $ref: '#/components/schemas/VerificationLayer' }
        isComplete: { type: boolean }
        points:     { type: integer, description: "Points this layer contributes to trust score (Phone=20, Face=25, Voice=15, Work=20, Education=20)." }
        completedAt: { type: string, format: date-time, nullable: true }

    VerificationStatusDto:
      type: object
      required: [status, trustScore, layers, submittedAt]
      properties:
        status:      { $ref: '#/components/schemas/VerificationStatus' }
        trustScore:  { type: integer, minimum: 0, maximum: 100, description: "Sum of points from completed layers." }
        layers:      { type: array, items: { $ref: '#/components/schemas/VerificationLayerDto' } }
        rejectionReason: { type: string, nullable: true }
        submittedAt: { type: string, format: date-time, nullable: true }
        reviewedAt:  { type: string, format: date-time, nullable: true }

    # ── Habit DTOs ────────────────────────────────────────────────────────────

    HabitDayDto:
      type: object
      required: [date, logged]
      properties:
        date:   { type: string, format: date }
        logged: { type: boolean }

    HabitDto:
      type: object
      required: [habitKey, label, icon, isLoggedToday, currentStreak, weekHistory]
      properties:
        habitKey:      { $ref: '#/components/schemas/HabitKey' }
        label:         { type: string, example: "Morning Routine" }
        icon:          { type: string, example: "☀️", description: "Emoji icon for the habit." }
        isLoggedToday: { type: boolean }
        currentStreak: { type: integer, description: "Consecutive days logged." }
        weekHistory:   { type: array, items: { $ref: '#/components/schemas/HabitDayDto' }, maxItems: 7 }

    HabitStreakDto:
      type: object
      required: [totalDaysLogged, longestStreak, currentStreak, lastLoggedAt]
      properties:
        totalDaysLogged: { type: integer }
        longestStreak:   { type: integer }
        currentStreak:   { type: integer }
        lastLoggedAt:    { type: string, format: date-time, nullable: true }

    HabitReflectionDto:
      type: object
      required: [weekOf, reflectionText, generatedAt]
      properties:
        weekOf:         { type: string, format: date, description: "ISO date of the Monday starting the reflected week." }
        reflectionText: { type: string, description: "AI-generated or template-based weekly reflection." }
        generatedAt:    { type: string, format: date-time }

    # ── Introduction DTOs ─────────────────────────────────────────────────────

    MatchDimensionDto:
      type: object
      required: [dimension, score, label]
      properties:
        dimension: { type: string, example: "familyStyle", description: "Camel-case dimension key from ScoreBreakdown." }
        score:     { type: number, format: float, minimum: 0, maximum: 1 }
        label:     { type: string, example: "Life abroad", description: "Human-readable dimension name for display." }

    MatchContextDto:
      type: object
      required: [totalScore, topDimensions, explanationText]
      properties:
        totalScore:      { type: number, format: float, description: "Overall compatibility score 0.0–1.0." }
        topDimensions:   { type: array, items: { $ref: '#/components/schemas/MatchDimensionDto' }, maxItems: 3 }
        explanationText: { type: string, description: "Rule-based or LLM-cached 'Why this match?' narrative." }

    IntroductionDto:
      type: object
      required: [id, weekOf, profile, matchContext, status, creditCost]
      properties:
        id:           { type: string, format: uuid }
        weekOf:       { type: string, format: date, description: "Monday of the week this intro was dropped." }
        profile:
          type: object
          required: [userId, name, age, city, country, photoUrl, completionScore]
          properties:
            userId:          { type: string, format: uuid }
            name:            { type: string }
            age:             { type: integer }
            city:            { type: string }
            country:         { type: string }
            photoUrl:        { type: string, format: uri, nullable: true }
            completionScore: { type: integer }
        matchContext: { $ref: '#/components/schemas/MatchContextDto' }
        status:       { type: string, enum: [PENDING, CONNECTED, PASSED], description: "User's action on this intro." }
        creditCost:   { type: integer, description: "Credits required to unlock this introduction." }
        unlockedAt:   { type: string, format: date-time, nullable: true }
        expiresAt:    { type: string, format: date-time, nullable: true, description: "When this intro expires if no action taken." }

    # ── Event (Gathering) DTOs ────────────────────────────────────────────────

    EventDto:
      type: object
      required: [id, title, description, eventDate, location, tag, rsvpCount, maxRsvp, isRsvped, creditCost, createdAt]
      properties:
        id:          { type: string, format: uuid }
        title:       { type: string, example: "London Diwali Mixer" }
        description: { type: string }
        eventDate:   { type: string, format: date-time }
        location:    { type: string, example: "Canary Wharf, London" }
        onlineUrl:   { type: string, format: uri, nullable: true, description: "Video link for virtual events." }
        tag:         { $ref: '#/components/schemas/EventTag' }
        rsvpCount:   { type: integer }
        maxRsvp:     { type: integer, nullable: true }
        isRsvped:    { type: boolean }
        creditCost:  { type: integer, description: "Credits to RSVP. 0 for free events." }
        whyInvited:  { type: string, nullable: true, description: "Short personalised reason why this event was surfaced." }
        createdAt:   { type: string, format: date-time }

    # ── Weekly Prompt DTOs ────────────────────────────────────────────────────

    PromptDto:
      type: object
      required: [id, weekOf, promptText, responseType, expiresAt]
      properties:
        id:           { type: string, format: uuid }
        weekOf:       { type: string, format: date }
        promptText:   { type: string, example: "What does a Sunday well-spent look like for you?" }
        responseType: { $ref: '#/components/schemas/PromptResponseType' }
        expiresAt:    { type: string, format: date-time }
        myResponse:
          type: object
          nullable: true
          properties:
            text:     { type: string, nullable: true }
            audioUrl: { type: string, format: uri, nullable: true }
            submittedAt: { type: string, format: date-time }

    PromptResponseDto:
      type: object
      required: [id, promptId, userId, responseType, resonateCount, hasResonated, createdAt]
      properties:
        id:            { type: string, format: uuid }
        promptId:      { type: string, format: uuid }
        userId:        { type: string, format: uuid }
        userName:      { type: string }
        userPhotoUrl:  { type: string, format: uri, nullable: true }
        responseType:  { $ref: '#/components/schemas/PromptResponseType' }
        text:          { type: string, nullable: true }
        audioUrl:      { type: string, format: uri, nullable: true }
        durationSeconds: { type: integer, nullable: true }
        resonateCount: { type: integer }
        hasResonated:  { type: boolean, description: "True if the authenticated user has resonated this response." }
        createdAt:     { type: string, format: date-time }

    # ── Saved Profile DTOs ────────────────────────────────────────────────────

    SavedProfileDto:
      type: object
      required: [id, targetUserId, label, createdAt]
      properties:
        id:           { type: string, format: uuid }
        targetUserId: { type: string, format: uuid }
        label:        { $ref: '#/components/schemas/SavedProfileLabel', nullable: true }
        note:         { type: string, nullable: true, maxLength: 500 }
        expiresAt:    { type: string, format: date-time, nullable: true, description: "When the save expires (for EXPIRING label)." }
        createdAt:    { type: string, format: date-time }
        profile:
          type: object
          nullable: true
          description: "Snapshot of the saved profile. Populated in list views."
          properties:
            name:        { type: string }
            age:         { type: integer }
            city:        { type: string }
            country:     { type: string }
            photoUrl:    { type: string, format: uri, nullable: true }
            totalScore:  { type: number, format: float, nullable: true }

    # ── Signals DTOs ──────────────────────────────────────────────────────────

    SignalMetricDto:
      type: object
      required: [key, label, value, delta]
      properties:
        key:   { type: string, example: "profileViews" }
        label: { type: string, example: "Profile Views" }
        value: { type: integer }
        delta: { type: integer, description: "Change vs previous week. Positive = up." }

    ActionQueueItemDto:
      type: object
      required: [type, label, targetUserId, priority]
      properties:
        type:         { type: string, enum: [RESPOND_TO_INTRO, COMPLETE_PROFILE, LOG_HABIT, RSVP_EVENT, REPLY_TO_CONNECTION], description: "Action category." }
        label:        { type: string, example: "Reply to Arjun's intro" }
        targetUserId: { type: string, format: uuid, nullable: true }
        priority:     { type: integer, minimum: 1, maximum: 5, description: "1 = highest." }
        expiresAt:    { type: string, format: date-time, nullable: true }

    SignalsWeekDto:
      type: object
      required: [weekOf, metrics, actionQueue, momentumScore]
      properties:
        weekOf:        { type: string, format: date }
        metrics:       { type: array, items: { $ref: '#/components/schemas/SignalMetricDto' } }
        actionQueue:   { type: array, items: { $ref: '#/components/schemas/ActionQueueItemDto' } }
        momentumScore: { type: integer, minimum: 0, maximum: 100, description: "Overall momentum score for the week." }

    # ── Trust Center DTOs ─────────────────────────────────────────────────────

    TrustLayerDto:
      type: object
      required: [layer, isComplete, points, label, description]
      properties:
        layer:       { $ref: '#/components/schemas/VerificationLayer' }
        isComplete:  { type: boolean }
        points:      { type: integer }
        label:       { type: string, example: "Face Verified" }
        description: { type: string, example: "Selfie matched to ID document by admin review." }
        completedAt: { type: string, format: date-time, nullable: true }

    TrustCenterDto:
      type: object
      required: [trustScore, maxScore, layers, isBlocked, isPaused]
      properties:
        trustScore:  { type: integer, minimum: 0, maximum: 100 }
        maxScore:    { type: integer, example: 100 }
        layers:      { type: array, items: { $ref: '#/components/schemas/TrustLayerDto' } }
        isBlocked:   { type: boolean, description: "True if the authenticated user has blocked the viewed user (only set on GET /{targetUserId})." }
        isPaused:    { type: boolean, description: "True if the authenticated user's own profile is paused." }

    # ── Match Tuning DTOs ─────────────────────────────────────────────────────

    MatchTuningDto:
      type: object
      required: [updatedAt]
      properties:
        maxDistanceKm:      { type: integer, nullable: true, description: "Preferred max distance from current city. Null = no preference." }
        preferredCountries: { type: array, items: { type: string }, description: "ISO country codes the user prefers to match with." }
        familyStylePreference: { type: string, nullable: true, enum: [NUCLEAR, JOINT, FLEXIBLE], description: "Preferred family structure." }
        openToKids:         { type: boolean, nullable: true }
        ageRangeMin:        { type: integer, nullable: true }
        ageRangeMax:        { type: integer, nullable: true }
        updatedAt:          { type: string, format: date-time }

    # ── Credit transaction ─────────────────────────────────────────────────────

    CreditTransactionDto:
      type: object
      required: [id, delta, balanceAfter, reason, createdAt]
      properties:
        id:           { type: string, format: uuid }
        delta:        { type: integer, description: "Positive = credit, negative = debit." }
        balanceAfter: { type: integer, description: "Running balance after this transaction." }
        reason:       { $ref: '#/components/schemas/CreditTransactionReason' }
        description:  { type: string, nullable: true }
        createdAt:    { type: string, format: date-time }

    # ── Standard response wrappers ────────────────────────────────────────────

    ErrorResponse:
      type: object
      required: [success, error]
      properties:
        success:   { type: boolean, enum: [false] }
        error:     { $ref: '#/components/schemas/ApiError' }
        requestId: { type: string }

  # ── Reusable Parameters ───────────────────────────────────────────────────

  parameters:
    convIdPath:
      name: convId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Conversation UUID

    msgIdPath:
      name: msgId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Message UUID

    userIdPath:
      name: userId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: User UUID

    flagIdPath:
      name: flagId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Flag UUID

    cursorQuery:
      name: cursor
      in: query
      required: false
      schema: { type: string }
      description: Opaque pagination cursor from a previous response

    limitQuery:
      name: limit
      in: query
      required: false
      schema: { type: integer, minimum: 1, maximum: 100, default: 20 }
      description: Number of items per page

    connectionIdPath:
      name: connectionId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Connection UUID

    groupIdPath:
      name: groupId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Group UUID

    eventIdPath:
      name: eventId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Event (Gathering) UUID

    introIdPath:
      name: introId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Introduction UUID

    dropIdPath:
      name: dropId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: IntroductionDrop UUID

    promptIdPath:
      name: promptId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Weekly Prompt UUID

    responseIdPath:
      name: responseId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Prompt Response UUID

    targetUserIdPath:
      name: targetUserId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Target user UUID

    verificationIdPath:
      name: verificationId
      in: path
      required: true
      schema: { type: string, format: uuid }
      description: Verification submission UUID

    habitKeyPath:
      name: habitKey
      in: path
      required: true
      schema: { $ref: '#/components/schemas/HabitKey' }
      description: Habit canonical key

  # ── Reusable Responses ────────────────────────────────────────────────────

  responses:
    400BadRequest:
      description: Validation error or bad request
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            error: { code: VALIDATION_ERROR, message: "Phone must be in E.164 format" }

    401Unauthorized:
      description: Missing or invalid Bearer token
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            error: { code: UNAUTHORIZED, message: "Access token is invalid or expired" }

    403Forbidden:
      description: Insufficient role
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    404NotFound:
      description: Resource not found
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

    429TooManyRequests:
      description: Rate limit exceeded
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }
          example:
            success: false
            error: { code: RATE_LIMIT_EXCEEDED, message: "Too many requests. Try again in 3600 seconds.", details: { retryAfterSeconds: 3600 } }

    500InternalError:
      description: Unexpected server error
      content:
        application/json:
          schema: { $ref: '#/components/schemas/ErrorResponse' }

# ── Tags ──────────────────────────────────────────────────────────────────────

