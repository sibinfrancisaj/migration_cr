        - userBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/cursorQuery'
        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: Blocked users list
          content:
            application/json:
              example:
                success: true
                data:
                  - { targetUserId: "usr-uuid-arjun", name: "Arjun S.", blockedAt: "2026-05-29T10:00:00.000Z" }
                meta: { hasMore: false }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /api/v1/trust/{targetUserId}/report:
    post:
      tags: [Trust Center]
      summary: Report a user
      description: Creates a moderation flag against the target user. Rate-limited to 5 per hour.
      operationId: reportUser
      security:
        - userBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/targetUserIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason:      { $ref: '#/components/schemas/FlagReason' }
                description: { type: string, maxLength: 500, nullable: true }
            example:
              reason: "FAKE_IDENTITY"
              description: "Profile photos appear to be stock images"
      responses:
        '201':
          description: Report submitted
          content:
            application/json:
              example:
                success: true
                data: { flagId: "flag-uuid", status: "OPEN" }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '429': { $ref: '#/components/responses/429TooManyRequests' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Habits ─────────────────────────────────────────────────────────────────

  /api/v1/habits:
    get:
      tags: [Habits]
      summary: Get my habits
      description: Returns all habits with current state, streak, and 7-day dot tracker.
      operationId: getHabits
      security:
        - userBearerAuth: []
      responses:
        '200':
          description: Habit list
          content:
            application/json:
              example:
                success: true
                data:
                  - habitKey: "MORNING_ROUTINE"
                    label: "Morning Routine"
                    icon: "sunrise"
                    isLoggedToday: true
                    currentStreak: 5
                    weekHistory:
                      - { date: "2026-05-23", logged: true }
                      - { date: "2026-05-24", logged: true }
                      - { date: "2026-05-25", logged: false }
                      - { date: "2026-05-26", logged: true }
                      - { date: "2026-05-27", logged: true }
                      - { date: "2026-05-28", logged: true }
                      - { date: "2026-05-29", logged: true }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /api/v1/habits/{habitKey}/log:
    post:
      tags: [Habits]
      summary: Log a habit for today
      description: Idempotent daily log. Updates streak and consistency score dimension.
      operationId: logHabit
      security:
        - userBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/habitKeyPath'
      responses:
        '200':
          description: Habit logged
          content:
            application/json:
              example:
                success: true
                data: { habitKey: "MORNING_ROUTINE", loggedAt: "2026-05-29T07:30:00.000Z", currentStreak: 5, isNewLog: true }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '429': { $ref: '#/components/responses/429TooManyRequests' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /api/v1/habits/streak:
    get:
      tags: [Habits]
      summary: Get overall habit streak summary
      operationId: getHabitStreak
      security:
        - userBearerAuth: []
      responses:
        '200':
          description: Streak summary
          content:
            application/json:
              example:
                success: true
                data:
                  totalDaysLogged: 42
                  longestStreak: 14
                  currentStreak: 5
                  lastLoggedAt: "2026-05-29T07:30:00.000Z"
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /api/v1/habits/reflection:
    get:
      tags: [Habits]
      summary: Get weekly habit reflection
      description: AI-generated or template-based weekly reflection. Returns 404 if fewer than 3 logs this week.
      operationId: getHabitReflection
      security:
        - userBearerAuth: []
      responses:
        '200':
          description: Weekly reflection
          content:
            application/json:
              example:
                success: true
                data:
                  weekOf: "2026-05-23"
                  reflectionText: "You maintained your morning routine for 5 out of 7 days. Consider adding mindfulness to complement your exercise habit."
                  generatedAt: "2026-05-29T09:00:00.000Z"
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /api/v1/habits/check-in:
    post:
      tags: [Habits]
      summary: Submit Sunday check-in
      description: |
        Records the weekly check-in. Updates checkInRecency scoring dimension.
        Returns 409 if already checked in this week. Rate-limited: 3 per week.
      operationId: submitCheckIn
      security:
        - userBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                mood:  { type: integer, minimum: 1, maximum: 5, nullable: true }
                notes: { type: string, maxLength: 280, nullable: true }
      responses:
        '201':
          description: Check-in recorded
          content:
            application/json:
              example:
                success: true
                data: { checkedInAt: "2026-05-29T09:00:00.000Z", weekOf: "2026-05-25" }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '409':
          description: Already checked in this week
          content:
            application/json:
              example:
                success: false
                error: { code: ALREADY_CHECKED_IN, message: "You have already checked in this week" }
        '429': { $ref: '#/components/responses/429TooManyRequests' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Match Tuning ───────────────────────────────────────────────────────────

  /api/v1/matches/tuning:
    get:
      tags: [Match Tuning]
      summary: Get current match tuning preferences
      operationId: getMatchTuning
      security:
        - userBearerAuth: []
      responses:
        '200':
          description: Match tuning preferences
          content:
            application/json:
              example:
                success: true
                data:
                  maxDistanceKm: null
                  preferredCountries: ["GB", "CA"]
                  familyStylePreference: "FLEXIBLE"
                  openToKids: true
                  ageRangeMin: 26
                  ageRangeMax: 36
                  updatedAt: "2026-05-20T10:00:00.000Z"
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500InternalError' }

    put:
      tags: [Match Tuning]
      summary: Update match tuning preferences
      description: "Partial update — only provided fields are changed. Triggers async rescore via BullMQ. Rate-limited to 10 per hour."
      operationId: updateMatchTuning
      security:
        - userBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                maxDistanceKm:         { type: integer, minimum: 0, nullable: true }
                preferredCountries:    { type: array, items: { type: string }, nullable: true }
                familyStylePreference: { type: string, enum: [NUCLEAR, JOINT, FLEXIBLE], nullable: true }
                openToKids:            { type: boolean, nullable: true }
                ageRangeMin:           { type: integer, minimum: 18, maximum: 80, nullable: true }
                ageRangeMax:           { type: integer, minimum: 18, maximum: 80, nullable: true }
            example:
              preferredCountries: ["GB", "CA"]
              familyStylePreference: "FLEXIBLE"
              ageRangeMin: 26
              ageRangeMax: 36
      responses:
        '200':
          description: Tuning updated
          content:
            application/json:
              example:
                success: true
                data: { updatedAt: "2026-05-29T10:00:00.000Z", rescoreEnqueued: true }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '429': { $ref: '#/components/responses/429TooManyRequests' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Payment — Credits (extended) ───────────────────────────────────────────

  /api/v1/payment/credits/transactions:
    get:
      tags: [Payment — Credits]
      summary: Get credit transaction history
      description: Returns the append-only credit ledger for the user. Newest first. Cursor-paginated.
      operationId: getCreditTransactions
      security:
        - userBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/cursorQuery'
        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: Credit transaction history
          content:
            application/json:
              example:
                success: true
                data:
                  - { id: "ledger-uuid", delta: 200, balanceAfter: 240, reason: "PURCHASE", description: "Bought 200 credit pack", createdAt: "2026-05-29T08:00:00.000Z" }
                  - { id: "ledger-uuid-2", delta: -300, balanceAfter: 0, reason: "INTRO_UNLOCK", description: "Unlocked introduction to Arjun", createdAt: "2026-05-29T09:00:00.000Z" }
                meta: { hasMore: false }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Admin — Users ──────────────────────────────────────────────────────────

  /admin/users/list:
    post:
      tags: [Admin — Users]
      summary: Search and list users
      description: Paginated user search with filters. Requires OPS role or higher.
      operationId: adminListUsers
      security:
        - adminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                search:             { type: string }
                role:               { $ref: '#/components/schemas/UserRole' }
                verificationStatus: { $ref: '#/components/schemas/VerificationStatus' }
                country:            { type: string }
                page:               { type: integer, minimum: 1, default: 1 }
                limit:              { type: integer, minimum: 1, maximum: 100, default: 20 }
            example:
              role: "VERIFIED"
              country: "UK"
              page: 1
              limit: 20
      responses:
        '200':
          description: User list
          content:
            application/json:
              example:
                success: true
                data:
                  - { id: "usr-uuid", phone: "+4479****1234", role: "VERIFIED", country: "UK", verificationStatus: "APPROVED", createdAt: "2026-05-01T00:00:00.000Z" }
                meta: { hasMore: false, total: 1 }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/users/{userId}:
    get:
      tags: [Admin — Users]
      summary: Get full user detail (admin view)
      description: Admin-level detail including profile, membership, trust score, and flag count. Requires OPS or higher.
      operationId: adminGetUser
      security:
        - adminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userIdPath'
      responses:
        '200':
          description: Full user detail
          content:
            application/json:
              example:
                success: true
                data:
                  id: "usr-uuid"
                  phone: "+4479****1234"
                  role: "VERIFIED"
                  verificationStatus: "APPROVED"
                  trustScore: 80
                  membership: { plan: "FOUNDING_MEMBER", status: "ACTIVE" }
                  creditBalance: 240
                  flagCount: 0
                  createdAt: "2026-05-01T00:00:00.000Z"
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/users/{userId}/role:
    put:
      tags: [Admin — Users]
      summary: Update a user's role
      description: Requires SUPERADMIN. Audit logged.
      operationId: adminUpdateUserRole
      security:
        - adminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [role]
              properties:
                role:   { $ref: '#/components/schemas/UserRole' }
                reason: { type: string, maxLength: 200, nullable: true }
            example:
              role: "FOUNDING_MEMBER"
              reason: "Manual upgrade after payment confirmation"
      responses:
        '200':
          description: Role updated
          content:
            application/json:
              example:
                success: true
                data: { userId: "usr-uuid", role: "FOUNDING_MEMBER", updatedAt: "2026-05-29T10:00:00.000Z" }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/users/{userId}/suspend:
    put:
      tags: [Admin — Users]
      summary: Suspend or reinstate a user
      description: Sets role to SUSPENDED or reinstates to USER. Revokes all sessions. Requires MODERATOR or higher.
      operationId: adminSuspendUser
      security:
        - adminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [suspend]
              properties:
                suspend: { type: boolean }
                reason:  { type: string, maxLength: 200, nullable: true }
            example:
              suspend: true
              reason: "Multiple confirmed harassment reports"
      responses:
        '200':
          description: User suspended or reinstated
          content:
            application/json:
              example:
                success: true
                data: { userId: "usr-uuid", role: "SUSPENDED", updatedAt: "2026-05-29T10:00:00.000Z" }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Admin — Analytics ──────────────────────────────────────────────────────

  /admin/analytics/overview:
    get:
      tags: [Admin — Analytics]
      summary: Platform analytics overview
      description: Top-level metrics cached 60 minutes. Requires ANALYST or higher.
      operationId: adminGetAnalyticsOverview
      security:
        - adminBearerAuth: []
      responses:
        '200':
          description: Analytics overview
          content:
            application/json:
              example:
                success: true
                data:
                  totalUsers: 4823
                  verifiedUsers: 1240
                  activeThisWeek: 892
                  foundingMembers: 156
                  totalRevenuePaise: 782500000
                  connectionsThisWeek: 234
                  messagesThisWeek: 4512
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/analytics/signups:
    get:
      tags: [Admin — Analytics]
      summary: Signup trends
      description: Daily signup counts for past N days (default 30, max 90). Requires ANALYST or higher.
      operationId: adminGetSignupTrends
      security:
        - adminBearerAuth: []
      parameters:
        - name: days
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 90, default: 30 }
      responses:
        '200':
          description: Daily signup counts
          content:
            application/json:
              example:
                success: true
                data:
                  - { date: "2026-05-01", count: 12 }
                  - { date: "2026-05-02", count: 18 }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/analytics/engagement:
    get:
      tags: [Admin — Analytics]
      summary: Weekly engagement metrics
      description: Weekly engagement breakdown. Requires ANALYST or higher.
      operationId: adminGetEngagementMetrics
      security:
        - adminBearerAuth: []
      parameters:
        - name: weeks
          in: query
          required: false
          schema: { type: integer, minimum: 1, maximum: 12, default: 4 }
      responses:
        '200':
          description: Weekly engagement data
          content:
            application/json:
              example:
                success: true
                data:
                  - weekOf: "2026-05-18"
                    messagesSent: 3421
                    connectionsMade: 198
                    introsUnlocked: 87
                    eventsRsvped: 56
                    habitsLogged: 1204
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Admin — Verification ───────────────────────────────────────────────────

  /admin/verification/queue:
    post:
      tags: [Admin — Verification]
      summary: List pending verification submissions
      description: Filter by status, paginated. Requires OPS or higher.
      operationId: adminListVerificationQueue
      security:
        - adminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status: { $ref: '#/components/schemas/VerificationStatus' }
                page:   { type: integer, minimum: 1, default: 1 }
                limit:  { type: integer, minimum: 1, maximum: 50, default: 20 }
            example:
              status: "UNDER_REVIEW"
              page: 1
              limit: 20
      responses:
        '200':
          description: Verification queue
          content:
            application/json:
              example:
                success: true
                data:
                  - id: "ver-uuid"
                    userId: "usr-uuid"
                    documentType: "PASSPORT"
                    documentUrl: "https://cdn.abroadmatrimony.com/id/usr-uuid/passport.jpg"
                    selfieUrl: "https://cdn.abroadmatrimony.com/selfie/usr-uuid/selfie.jpg"
                    status: "UNDER_REVIEW"
                    submittedAt: "2026-05-29T08:00:00.000Z"
                meta: { hasMore: false, total: 3 }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/verification/{verificationId}/approve:
    put:
      tags: [Admin — Verification]
      summary: Approve identity verification
      description: |
        Marks APPROVED, sets user VerificationStatus = APPROVED, upgrades role to VERIFIED,
        marks FACE trust layer complete, fires USER_VERIFIED CloudEvent.
        Requires OPS or higher.
      operationId: adminApproveVerification
      security:
        - adminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/verificationIdPath'
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                note: { type: string, maxLength: 200, nullable: true }
      responses:
        '200':
          description: Verification approved
          content:
            application/json:
              example:
                success: true
                data: { verificationId: "ver-uuid", status: "APPROVED", userId: "usr-uuid", newRole: "VERIFIED" }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '409':
          description: Not in UNDER_REVIEW state
          content:
            application/json:
              example:
                success: false
                error: { code: VERIFICATION_NOT_REVIEWABLE, message: "This submission is already resolved" }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/verification/{verificationId}/reject:
    put:
      tags: [Admin — Verification]
      summary: Reject identity verification
      description: |
        Marks REJECTED. Fires VERIFICATION_REJECTED CloudEvent (triggers email).
        Requires OPS or higher.
      operationId: adminRejectVerification
      security:
        - adminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/verificationIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [reason]
              properties:
                reason: { type: string, maxLength: 500 }
            example:
              reason: "ID document is blurry and unreadable. Please resubmit."
      responses:
        '200':
          description: Verification rejected
          content:
            application/json:
              example:
                success: true
                data: { verificationId: "ver-uuid", status: "REJECTED", reason: "ID document is blurry." }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '409':
          description: Not in UNDER_REVIEW state
          content:
            application/json:
              example:
                success: false
                error: { code: VERIFICATION_NOT_REVIEWABLE, message: "This submission is already resolved" }
        '500': { $ref: '#/components/responses/500InternalError' }
