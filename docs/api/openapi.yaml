  - name: Verification
    description: Identity document + selfie submission and status
  - name: Conversations
    description: Real-time conversation management and messaging
  - name: Messages
    description: Individual message actions (flagging)
  - name: Introductions
    description: Weekly curated intro drop — unlock, pass, match context
  - name: Gatherings
    description: Community events — browse, RSVP, attendees
  - name: Weekly Prompts
    description: Weekly text/voice prompt — respond, browse, resonate
  - name: Saved Profiles
    description: Save, label, and annotate profiles for later
  - name: Signals
    description: Activity signals dashboard and action queue
  - name: Trust Center
    description: Trust score layers, block, report, and pause profile
  - name: Habits
