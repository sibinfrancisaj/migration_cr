        '200':
          description: Current weekly prompt
          content:
            application/json:
              example:
                success: true
                data:
                  id: "prompt-uuid"
                  weekOf: "2026-05-25"
                  promptText: "What does a Sunday well-spent look like for you?"
                  responseType: "TEXT"
                  expiresAt: "2026-06-01T09:00:00.000Z"
                  myResponse: null
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /api/v1/prompts/{promptId}/respond:
    post:
      tags: [Weekly Prompts]
      summary: Submit a response to a weekly prompt
      description: |
        Records the user's text or voice response. One response per user per prompt (upsert).
        Rate-limited: 5 submissions per prompt per user.
      operationId: respondToPrompt
      security:
        - userBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/promptIdPath'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [responseType]
              properties:
                responseType:    { $ref: '#/components/schemas/PromptResponseType' }
                text:            { type: string, maxLength: 1000, nullable: true }
                audioUrl:        { type: string, format: uri, nullable: true }
                durationSeconds: { type: integer, minimum: 1, maximum: 60, nullable: true }
            example:
              responseType: "TEXT"
              text: "A Sunday for me starts slow — chai, journaling, then a long walk."
      responses:
        '201':
          description: Response recorded
          content:
            application/json:
              example:
                success: true
                data: { id: "resp-uuid", promptId: "prompt-uuid", responseType: "TEXT", text: "A Sunday for me...", createdAt: "2026-05-29T10:00:00.000Z" }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '429': { $ref: '#/components/responses/429TooManyRequests' }
        '500': { $ref: '#/components/responses/500InternalError' }

