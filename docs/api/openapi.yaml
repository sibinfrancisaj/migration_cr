        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }
    post:
      tags: [Admin — System Config]
      summary: Create a system config entry
      operationId: adminCreateSystemConfig
      security:
        - adminBearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [key, value]
              properties:
                key:         { type: string, minLength: 1 }
                value:       { type: string, minLength: 1 }
                description: { type: string, maxLength: 200 }
            example: { key: "DRIP_BATCH_SIZE", value: "5" }
      responses:
        '201':
          description: Config entry created
          content:
            application/json:
              example: { success: true, data: { key: "DRIP_BATCH_SIZE", value: "5" } }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/system-config/{configKey}:
    get:
      tags: [Admin — System Config]
      summary: Get a system config entry by key
      operationId: adminGetSystemConfig
      security:
        - adminBearerAuth: []
      parameters:
        - { name: configKey, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Config entry
          content:
            application/json:
              example: { success: true, data: { key: "SUGGESTED_GROUPS_MAX", value: "20" } }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }
    put:
      tags: [Admin — System Config]
      summary: Upsert a system config entry
      operationId: adminUpsertSystemConfig
      security:
        - adminBearerAuth: []
      parameters:
        - { name: configKey, in: path, required: true, schema: { type: string } }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [value]
              properties:
                value:       { type: string, minLength: 1 }
                description: { type: string, maxLength: 200 }
            example: { value: "25" }
      responses:
        '200':
          description: Config entry upserted
          content:
            application/json:
              example: { success: true, data: { key: "SUGGESTED_GROUPS_MAX", value: "25" } }
        '400': { $ref: '#/components/responses/400BadRequest' }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }
    delete:
      tags: [Admin — System Config]
      summary: Delete a system config entry
      operationId: adminDeleteSystemConfig
      security:
        - adminBearerAuth: []
      parameters:
        - { name: configKey, in: path, required: true, schema: { type: string } }
      responses:
        '200':
          description: Config entry deleted
          content:
            application/json:
              example: { success: true, data: null, meta: { message: "Config entry deleted" } }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Admin — Seeder Monitoring (ADMIN-015) ──────────────────────────────────

  /admin/seeder/status:
    get:
      tags: [Admin — Seeder]
      summary: Get seeder service status
      description: Seeder state and counts. Non-production only. Requires SUPERADMIN.
      operationId: adminGetSeederStatus
      security:
        - adminBearerAuth: []
      responses:
        '200':
          description: Seeder status
          content:
            application/json:
              example:
                success: true
                data: { isRunning: false, totalSeededProfiles: 487, lastDripAt: "2026-05-31T18:00:00.000Z", dripPaused: false }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/seeder/flush:
    post:
      tags: [Admin — Seeder]
      summary: Flush all seeded data
      description: Deletes all isSeeded=true records. Irreversible. SUPERADMIN only.
      operationId: adminFlushSeededData
      security:
        - adminBearerAuth: []
      responses:
        '200':
          description: Seeded data flushed
          content:
            application/json:
              example:
                success: true
                data: { deletedCounts: { users: 487, profiles: 487, messages: 8420 } }
                meta: { message: "All seeded data flushed" }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  # ── Admin — AI Monitoring (ADMIN-016) ─────────────────────────────────────

  /admin/ai/embeddings/status:
    get:
      tags: [Admin — AI]
      summary: Get AI embedding queue status
      description: Coverage overview. Requires SUPERADMIN.
      operationId: adminGetEmbeddingStatus
      security:
        - adminBearerAuth: []
      responses:
        '200':
          description: Embedding status
          content:
            application/json:
              example:
                success: true
                data: { totalProfiles: 1240, withEmbedding: 1190, stale: 50, queueDepth: 3 }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/ai/embeddings:
    get:
      tags: [Admin — AI]
      summary: List ProfileEmbeddings
      description: Paginated list with optional stale filter. Requires SUPERADMIN.
      operationId: adminListEmbeddings
      security:
        - adminBearerAuth: []
      parameters:
        - { name: staleOnly, in: query, schema: { type: boolean, default: false } }
        - { name: limit,     in: query, schema: { type: integer, minimum: 1, maximum: 100, default: 20 } }
        - { name: cursor,    in: query, schema: { type: string } }
      responses:
        '200':
          description: Embeddings list
          content:
            application/json:
              example:
                success: true
                data:
                  items:
                    - { userId: "usr-uuid", updatedAt: "2026-05-29T10:00:00.000Z", isStale: false }
                  hasMore: false
                  nextCursor: null
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/ai/embeddings/recompute-all:
    post:
      tags: [Admin — AI]
      summary: Recompute all stale embeddings
      description: Enqueues BullMQ jobs for stale or missing embeddings. Requires SUPERADMIN.
      operationId: adminRecomputeAllEmbeddings
      security:
        - adminBearerAuth: []
      responses:
        '200':
          description: Jobs enqueued
          content:
            application/json:
              example:
                success: true
                data: { jobsQueued: 50 }
                meta: { message: "50 recompute jobs enqueued" }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '500': { $ref: '#/components/responses/500InternalError' }

  /admin/ai/embeddings/{userId}/recompute:
    post:
      tags: [Admin — AI]
      summary: Recompute embedding for a single user
      description: Enqueues BullMQ profile intelligence job. Requires SUPERADMIN.
      operationId: adminRecomputeUserEmbedding
      security:
        - adminBearerAuth: []
      parameters:
        - $ref: '#/components/parameters/userIdPath'
      responses:
        '200':
          description: Recompute job enqueued
          content:
            application/json:
              example:
                success: true
                data: { jobId: "pi-usr-uuid", userId: "usr-uuid" }
                meta: { message: "Recompute job enqueued" }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '403': { $ref: '#/components/responses/403Forbidden' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }
