        - $ref: '#/components/parameters/limitQuery'
      responses:
        '200':
          description: Paginated response feed
          content:
            application/json:
              example:
                success: true
                data:
                  - id: "resp-uuid-2"
                    userId: "usr-uuid-arjun"
                    userName: "Arjun"
                    responseType: "TEXT"
                    text: "Sunday is family brunch followed by cricket highlights."
                    resonateCount: 7
                    hasResonated: false
                    createdAt: "2026-05-29T08:00:00.000Z"
                meta: { hasMore: false }
        '401': { $ref: '#/components/responses/401Unauthorized' }
        '404': { $ref: '#/components/responses/404NotFound' }
        '500': { $ref: '#/components/responses/500InternalError' }

