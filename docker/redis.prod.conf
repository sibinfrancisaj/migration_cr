bind 0.0.0.0
protected-mode yes
port 6379
timeout 300
tcp-keepalive 300
loglevel notice
databases 16

# Persistence — RDB + AOF for durability
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec
no-appendfsync-on-rewrite no
auto-aof-rewrite-percentage 100
auto-aof-rewrite-min-size 64mb

# Memory — increase for production load
maxmemory 512mb
maxmemory-policy allkeys-lru

# Security — password set via REDIS_PASSWORD env var (rendered by entrypoint)
# DO NOT hardcode here — use the requirepass line below which is injected at startup
# requirepass ${REDIS_PASSWORD}

# Slow log
slowlog-log-slower-than 10000
slowlog-max-len 128

# Disable dangerous commands in production
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   "CONFIG_9a3f2b"
