# ─────────────────────────────────────────────────────────────────────────────
# Nginx reverse proxy for Abroad Matrimony
# Handles: SSL termination, rate limiting, gzip, upstream routing
# ─────────────────────────────────────────────────────────────────────────────

worker_processes auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
  worker_connections 1024;
  use epoll;
  multi_accept on;
}

http {
  include       /etc/nginx/mime.types;
  default_type  application/octet-stream;

  # ── Logging ─────────────────────────────────────────────────────────────────
  log_format main '$remote_addr - $remote_user [$time_local] '
                  '"$request" $status $body_bytes_sent '
                  '"$http_referer" "$http_user_agent" '
                  'rt=$request_time uct=$upstream_connect_time '
                  'uht=$upstream_header_time urt=$upstream_response_time '
                  'rid=$http_x_request_id';

  access_log /var/log/nginx/access.log main;

  # ── Performance ──────────────────────────────────────────────────────────────
  sendfile           on;
  tcp_nopush         on;
  tcp_nodelay        on;
  keepalive_timeout  65;
  types_hash_max_size 2048;
  client_max_body_size 10m;    # profile photos up to 5MB + overhead

  # ── Gzip ────────────────────────────────────────────────────────────────────
  gzip              on;
  gzip_vary         on;
  gzip_proxied      any;
  gzip_comp_level   4;
  gzip_min_length   1000;
  gzip_types text/plain text/css application/json application/javascript
             text/xml application/xml application/xml+rss text/javascript;

  # ── Security headers ─────────────────────────────────────────────────────────
  add_header X-Frame-Options           DENY;
  add_header X-Content-Type-Options    nosniff;
  add_header X-XSS-Protection          "1; mode=block";
  add_header Referrer-Policy           "strict-origin-when-cross-origin";
  add_header Permissions-Policy        "geolocation=(), microphone=(), camera=()";
  server_tokens off;

  # ── Rate limiting zones ───────────────────────────────────────────────────────
  # General API: 60 req/min per IP
  limit_req_zone $binary_remote_addr zone=api_general:10m rate=60r/m;
  # Auth endpoints: stricter — 10 req/min per IP
  limit_req_zone $binary_remote_addr zone=api_auth:10m    rate=10r/m;
  # Webhook endpoints: 30 req/min (Stripe/Razorpay IPs only via upstream)
  limit_req_zone $binary_remote_addr zone=api_webhook:10m rate=30r/m;

  # ── Upstream: Gateway API ────────────────────────────────────────────────────
  upstream gateway {
    server gateway:3000;
    keepalive 32;
  }

  # ── Upstream: Seeder control API (internal only) ─────────────────────────────
  upstream seeder {
    server seeder:3100;
    keepalive 8;
  }

  # ── HTTP → HTTPS redirect ────────────────────────────────────────────────────
  server {
    listen 80;
    server_name _;

    # Let's Encrypt ACME challenge passthrough
    location /.well-known/acme-challenge/ {
      root /var/www/certbot;
    }

    location / {
      return 301 https://$host$request_uri;
    }
  }

  # ── HTTPS: Gateway API ───────────────────────────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name api.abroadmatrimony.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling        on;
    ssl_stapling_verify on;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ── Health check (no rate limit) ──────────────────────────────────────────
    location = /health {
      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Connection "";
      access_log off;
    }

    # ── Auth endpoints (strict rate limit) ───────────────────────────────────
    location ~ ^/api/v1/auth/(otp|trusted-device|magic-link) {
      limit_req zone=api_auth burst=5 nodelay;
      limit_req_status 429;

      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }

    # ── Webhook endpoints (raw body, no gzip) ────────────────────────────────
    location ~ ^/api/v1/payment/(stripe|razorpay)/webhook {
      limit_req zone=api_webhook burst=10 nodelay;

      # Must NOT buffer — Stripe/Razorpay need raw body
      proxy_request_buffering off;
      proxy_buffering         off;

      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   Connection        "";
      proxy_read_timeout 30s;
    }

    # ── All other API routes ──────────────────────────────────────────────────
    location /api/ {
      limit_req zone=api_general burst=20 nodelay;
      limit_req_status 429;

      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;

      # Pass 429 from upstream as-is
      proxy_intercept_errors off;
    }

    # ── Admin API ─────────────────────────────────────────────────────────────
    location /admin/ {
      # Restrict to known IP ranges (update with your office/VPN IPs)
      # allow 1.2.3.4;
      # deny all;

      limit_req zone=api_general burst=10 nodelay;

      proxy_pass         http://gateway;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   X-Request-ID      $request_id;
      proxy_set_header   Connection        "";
      proxy_read_timeout 60s;
    }
  }

  # ── HTTPS: Seeder control API (internal staging only) ────────────────────────
  server {
    listen 443 ssl http2;
    server_name seeder.abroadmatrimony.com;

    ssl_certificate     /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;

    # Hard-restrict to internal network / VPN only
    # allow 10.0.0.0/8;
    # allow 172.16.0.0/12;
    # deny all;

    location / {
      proxy_pass         http://seeder;
      proxy_http_version 1.1;
      proxy_set_header   Host              $host;
      proxy_set_header   X-Real-IP         $remote_addr;
      proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_set_header   Connection        "";
      proxy_read_timeout 120s;    # seeder runs can take a while
    }
  }
}
