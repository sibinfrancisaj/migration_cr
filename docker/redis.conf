bind 0.0.0.0
protected-mode no
port 6379
timeout 0
tcp-keepalive 300
loglevel notice
databases 16

# Persistence
save 900 1
save 300 10
save 60 10000
appendonly yes
appendfilename "appendonly.aof"
appendfsync everysec

# Memory
maxmemory 256mb
maxmemory-policy allkeys-lru

# Security (no password in local dev; set requirepass in production)
# requirepass your_redis_password
